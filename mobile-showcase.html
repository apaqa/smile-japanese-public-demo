<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>手機版展示 | 微笑日語</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: rgba(255, 255, 255, 0.08);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f8fafc;
        --muted: #b6c2d4;
        --accent: #ef8aa5;
        --scale: 1.42;
        --phone-width: 390px;
        --phone-height: 844px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 12%, rgba(239, 138, 165, 0.22), transparent 26%),
          radial-gradient(circle at 82% 18%, rgba(143, 199, 220, 0.18), transparent 24%),
          var(--bg);
        color: var(--text);
        font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      }

      .showcase {
        display: grid;
        min-height: 100vh;
        grid-template-columns: minmax(0, 1fr) 260px;
        gap: 22px;
        padding: 22px;
      }

      .stage {
        display: grid;
        min-width: 0;
        place-items: center;
      }

      .phone-frame {
        max-width: 100%;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 34px;
        background: linear-gradient(180deg, #1e293b, #020617);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      }

      .phone-top {
        display: grid;
        height: 28px;
        place-items: center;
      }

      .speaker {
        width: 72px;
        height: 7px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.24);
      }

      .phone-screen {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 22px;
        background: #fff;
      }

      iframe {
        display: block;
        width: var(--phone-width);
        max-width: 100%;
        height: var(--phone-height);
        border: 0;
        zoom: var(--scale);
      }

      .controls {
        align-self: center;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        backdrop-filter: blur(14px);
      }

      .controls h1 {
        margin: 0 0 8px;
        font-size: 20px;
        line-height: 1.25;
      }

      .controls p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
      }

      .page-list {
        display: grid;
        gap: 8px;
      }

      button {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      button:hover,
      button.is-active {
        border-color: rgba(239, 138, 165, 0.72);
        background: rgba(239, 138, 165, 0.2);
      }

      .scale-row {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .hint {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .demo-note {
        margin-top: 14px;
        padding: 10px 12px;
        border: 1px solid rgba(239, 138, 165, 0.34);
        border-radius: 10px;
        background: rgba(239, 138, 165, 0.12);
        color: #fce7ef;
        font-size: 12px;
        line-height: 1.5;
      }

      @media (max-width: 900px) {
        .showcase {
          grid-template-columns: 1fr;
        }

        .controls {
          align-self: auto;
        }
      }

      @media (max-width: 640px) {
        :root {
          --scale: 1;
          --phone-width: min(390px, calc(100vw - 58px));
          --phone-height: 72vh;
        }

        .showcase {
          gap: 14px;
          overflow-x: hidden;
          padding: 12px;
        }

        .phone-frame {
          border-radius: 26px;
          padding: 10px;
        }

        .phone-screen {
          border-radius: 18px;
        }

        iframe {
          zoom: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="showcase">
      <section class="stage" aria-label="放大手機展示區">
        <div class="phone-frame">
          <div class="phone-top"><span class="speaker"></span></div>
          <div class="phone-screen">
            <iframe id="phoneFrame" title="微笑日語手機版展示" src="index.html"></iframe>
          </div>
        </div>
      </section>

      <aside class="controls" aria-label="展示控制">
        <h1>手機版展示</h1>
        <p>Discord 分享時開這頁，手機畫面會比瀏覽器裝置模擬更大。</p>
        <div class="page-list" id="pageList"></div>
        <label class="scale-row">
          <span>放大比例 <strong id="scaleText">142%</strong></span>
          <input id="scaleRange" type="range" min="1" max="1.7" step="0.02" value="1.42">
        </label>
        <div class="hint">若畫面太高，先把比例拉低一點；若客戶看不清楚，就拉到 150% 左右。</div>
        <div class="demo-note">展示站提醒：此頁只用來截圖與說明手機版流程，資料皆為示意，不含真金流、真個資或真 API，不會進行真交易。</div>
      </aside>
    </main>

    <script>
      const pages = [
        ["index.html", "首頁"],
        ["courses.html", "課程列表"],
        ["course-detail.html", "課程詳情"],
        ["login.html", "登入註冊"],
        ["dashboard.html", "學習中心"],
        ["learn.html", "觀看頁"],
        ["booking.html", "預約課"],
        ["shop.html", "商城"],
        ["checkout.html", "結帳"],
        ["order-complete.html", "訂單完成"],
        ["admin.html", "後台"],
        ["architecture.html", "架構說明"],
      ];

      const params = new URLSearchParams(window.location.search);
      const frame = document.querySelector("#phoneFrame");
      const pageList = document.querySelector("#pageList");
      const scaleRange = document.querySelector("#scaleRange");
      const scaleText = document.querySelector("#scaleText");

      function setPage(page) {
        frame.src = page;
        params.set("page", page);
        history.replaceState(null, "", `${location.pathname}?${params}`);
        document.querySelectorAll("[data-page]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.page === page);
        });
      }

      function setScale(value) {
        document.documentElement.style.setProperty("--scale", value);
        scaleText.textContent = `${Math.round(Number(value) * 100)}%`;
        scaleRange.value = value;
        params.set("scale", value);
        history.replaceState(null, "", `${location.pathname}?${params}`);
      }

      pages.forEach(([page, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.page = page;
        button.textContent = label;
        button.addEventListener("click", () => setPage(page));
        pageList.append(button);
      });

      scaleRange.addEventListener("input", (event) => setScale(event.target.value));

      const initialPage = params.get("page") || "index.html";
      const initialScale = params.get("scale") || "1.42";
      setScale(initialScale);
      setPage(pages.some(([page]) => page === initialPage) ? initialPage : "index.html");
    </script>
  </body>
</html>
